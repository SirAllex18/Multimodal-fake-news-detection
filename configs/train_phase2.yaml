inherits: base.yaml

training:
  freeze_encoders: false
  unfreeze_top_n_layers: 4
  encoder_lr: 1.0e-6
  fusion_lr: 1.0e-5
  head_lr: 3.0e-5
  max_epochs: 15
  batch_size: 4
  grad_accum: 8
  # No Phase 1 resume: Phase 1 with frozen encoders overfits the heads on
  # CLIP+DeBERTa features (AUROC ~0.54), producing a worse init than the
  # pretrained priors. Train end-to-end with gradual unfreeze from step 0.
  resume_from: null
