data:
  dataset_root: "./DGM4"
  train_json: "metadata/train.json"
  val_json: "metadata/val.json"
  test_json: "metadata/test.json"
  max_text_length: 128
  image_size: 224
  num_workers: 4
  pin_memory: true

model:
  text_encoder_name: "microsoft/deberta-v3-base"
  image_encoder_name: "ViT-B-16"
  image_encoder_pretrained: "openai"
  hidden_dim: 768
  num_cross_attn_layers: 2
  num_cross_attn_heads: 8
  cross_attn_ffn_dim: 3072
  cross_attn_dropout: 0.1
  num_classes: 9
  num_patches: 196
  num_patches_with_cls: 197
  patch_grid: 14

loss:
  lambda_binary: 1.0
  lambda_type: 0.3
  lambda_text_grounding: 0.5
  lambda_image_grounding: 0.5
  lambda_consistency: 0.1
  use_class_weights: true
  focal_gamma: 2.0
  focal_alpha: 0.75
  dice_weight: 0.3

training:
  precision: "bf16-mixed"
  gradient_clip_val: 1.0
  seed: 42

sampling:
  use_balanced_sampler: true
  group_weights:
    orig: 1.0
    image_only: 1.5
    text_only: 2.5
    mixed: 3.0
